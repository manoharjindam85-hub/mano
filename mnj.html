 
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> MANOHAR JINDAM</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  color: white;
  background: linear-gradient(-45deg, #1e1e2f, #3a0ca3, #4361ee, #7209b7);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}

/* ANIMATED BACKGROUND */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

nav h1 {
  font-size: 24px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #00f5d4;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h2 {
  font-size: 48px;
  animation: fadeIn 2s ease-in;
}

.hero p {
  margin-top: 10px;
  opacity: 0.8;
  animation: fadeIn 3s ease-in;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: #00f5d4;
  color: black;
  cursor: pointer;
  border-radius: 25px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
section {
  padding: 80px 50px;
}

/* PROJECT CARDS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.4s;
  transform: translateY(50px);
  opacity: 0;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

/* FADE IN ANIMATION */
.show {
  transform: translateY(0);
  opacity: 1;
  transition: 0.8s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}

</style>
</head>

<body>

<nav>
  <h1>MANOHAR JINDAM</h1>
  <div>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact 9156117655</a>
  </div>
</nav>

<div class="hero">
  <h2>Hello, I'm a Developer ??</h2>
  <p>I build modern and responsive websites</p>
  <button class="btn">View Work</button>
</div>

<section id="projects">
  <h2>My Projects</h2>
  <div class="projects">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<footer id="contact">
  <p>@manoharjindam</p>
</footer>

<script>
// SCROLL ANIMATION
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const cardTop = card.getBoundingClientRect().top;
    if(cardTop < window.innerHeight - 100){
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
